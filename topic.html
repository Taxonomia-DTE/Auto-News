<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-News</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .page-topic { align-items: flex-start; padding-top: 32px; }
        .container-topic { max-width: 680px; }
        .topic-header { text-align: center; margin-bottom: 28px; }
        .topic-header h1 {
            font-size: 1.5rem; font-weight: 800; color: var(--gob-blue);
            letter-spacing: -0.02em;
        }

        /* Card horizontal: thumbnail izquierda, contenido derecha */
        .doc-card {
            display: flex;
            gap: 16px;
            align-items: stretch;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--gob-white);
            margin-bottom: 12px;
        }

        /* Thumbnail compacto, proporcion A4 */
        .doc-thumbnail {
            position: relative;
            flex-shrink: 0;
            width: 100px;
            aspect-ratio: 1 / 1.414;
            background: linear-gradient(135deg, #f8f9fb 0%, #eef0f4 100%);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .doc-thumbnail-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #9ca3af;
            user-select: none;
        }
        .doc-thumbnail-placeholder svg {
            width: 28px; height: 28px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .doc-thumbnail-placeholder .ext-tag {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }
        .doc-thumbnail img {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--gob-white);
            display: block;
        }
        .doc-thumbnail img.failed {
            display: none;
        }

        /* Contenido a la derecha */
        .doc-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .doc-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.3;
            word-break: break-word;
        }
        .doc-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .doc-actions {
            margin-top: auto;
        }
        .doc-actions .btn-primary {
            width: auto;
            padding: 8px 20px;
            font-size: 0.82rem;
            display: inline-block;
        }

        .sh { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .sh h2 {
            font-size: 0.88rem; font-weight: 700; color: var(--text);
            text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
        }
        .sh-line { flex: 1; height: 1px; background: var(--border); }
        .loading-state { text-align: center; padding: 32px; }
        .empty-state {
            text-align: center; padding: 32px 20px;
            border: 1px dashed var(--border); border-radius: var(--radius);
            background: var(--gob-white);
        }
        .empty-state p {
            font-size: 0.9rem; color: var(--text-muted); margin: 0;
        }

        @media (max-width: 600px) {
            .container-topic { padding: 24px 18px; }
            .doc-card { gap: 12px; padding: 12px; }
            .doc-thumbnail { width: 80px; }
            .doc-thumbnail-placeholder svg { width: 22px; height: 22px; }
            .doc-thumbnail-placeholder .ext-tag { font-size: 0.58rem; }
            .doc-title { font-size: 0.88rem; }
            .doc-actions .btn-primary {
                width: 100%;
                text-align: center;
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="tricolor-bar"></div>

    <div class="page page-topic">
        <div class="container container-topic">
            <div class="breadcrumb">
                <a href="index.html">Auto-News</a> &rsaquo; <span id="breadcrumbTitle">...</span>
            </div>

            <div id="content">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p style="font-size:0.85rem; color:var(--text-muted);">Cargando...</p>
                </div>
            </div>

            <div class="app-footer">
                <div style="font-size:0.78rem; color:var(--text-muted); line-height:1.6;">
                    División de Tecnologías Emergentes<br>
                    Ministerio de Ciencia, Tecnología, Conocimiento e Innovación<br>
                    Gobierno de Chile
                </div>
            </div>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('dte_auth') !== '1') {
            window.location.href = 'index.html';
        }

        var params = new URLSearchParams(window.location.search);
        var TOPIC_KEY = params.get('t');
        if (!TOPIC_KEY) { window.location.href = 'index.html'; }

        var MONTHS_ES = {
            '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun',
            '07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'
        };

        var DOC_ICON_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
            '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linejoin="round"/>' +
            '<polyline points="14 2 14 8 20 8" stroke-linejoin="round"/>' +
            '<line x1="8" y1="13" x2="16" y2="13" stroke-linecap="round"/>' +
            '<line x1="8" y1="17" x2="13" y2="17" stroke-linecap="round"/>' +
            '</svg>';

        function fmtDate(d) {
            var p = d.split('-');
            return (p[2] ? p[2]+' ':'') + (MONTHS_ES[p[1]]||p[1]) + ' ' + p[0];
        }

        function resolveUrl(u) {
            if (!u || u === 'REEMPLAZAR_CON_URL_DRIVE') return null;
            if (u.startsWith('http')) return u;
            return 'https://drive.google.com/file/d/' + u + '/view';
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getExtension(filename) {
            var idx = filename.lastIndexOf('.');
            if (idx <= 0 || idx === filename.length - 1) return 'DOC';
            return filename.substring(idx + 1).toUpperCase();
        }

        // Logging diagnostico: cada thumbnail fallido se reporta en consola.
        window.__thumbFailed = function(img, title) {
            console.warn('[Auto-News] Thumbnail fallo a cargar:', {
                titulo: title,
                url: img.src
            });
            img.classList.add('failed');
        };

        (async function() {
            try {
                var resp = await fetch('data.json?v=' + Date.now());
                var data = await resp.json();
                var topic = data.topics[TOPIC_KEY];
                if (!topic) throw new Error('Tematica no encontrada: ' + TOPIC_KEY);

                document.title = topic.title + ' - Auto-News';
                document.getElementById('breadcrumbTitle').textContent = topic.title;

                var html = '<div class="topic-header"><h1>' + escapeHtml(topic.title) + '</h1></div>';
                var newsletters = topic.newsletters || [];

                if (newsletters.length) {
                    newsletters.sort(function(a,b) { return b.date.localeCompare(a.date); });

                    html += '<div class="sh"><h2>Listado de archivos</h2><div class="sh-line"></div></div>';
                    for (var j = 0; j < newsletters.length; j++) {
                        var n = newsletters[j];
                        var url = resolveUrl(n.url);
                        var safeTitle = escapeHtml(n.title);
                        var ext = getExtension(n.title);

                        html += '<div class="doc-card">';
                        html += '<div class="doc-thumbnail">';
                        html += '<div class="doc-thumbnail-placeholder">';
                        html += DOC_ICON_SVG;
                        html += '<span class="ext-tag">' + escapeHtml(ext) + '</span>';
                        html += '</div>';
                        if (n.thumbnail) {
                            html += '<img src="' + escapeHtml(n.thumbnail) + '" ' +
                                'alt="Portada de ' + safeTitle + '" ' +
                                'loading="lazy" referrerpolicy="no-referrer" ' +
                                'onerror="window.__thumbFailed(this, \'' + safeTitle.replace(/'/g, "\\'") + '\')">';
                        }
                        html += '</div>';

                        html += '<div class="doc-body">';
                        html += '<div class="doc-title">' + safeTitle + '</div>' +
                            '<div class="doc-date">' + fmtDate(n.date) + '</div>' +
                            '<div class="doc-actions">';
                        if (url) {
                            html += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="btn-primary">Visualizar</a>';
                        } else {
                            html += '<span class="btn-primary" style="opacity:0.4; cursor:not-allowed;">Enlace pendiente</span>';
                        }
                        html += '</div></div>';
                        html += '</div>';
                    }
                } else {
                    html += '<div class="empty-state">' +
                        '<p>Sin documentos disponibles por ahora.</p>' +
                        '</div>';
                }

                html += '<div class="back-link" style="margin-top:20px;"><a href="index.html">&larr; Volver</a></div>';

                document.getElementById('content').innerHTML = html;
            } catch (err) {
                document.getElementById('content').innerHTML =
                    '<p style="color:var(--red); font-size:0.85rem; text-align:center;">Error: ' + escapeHtml(err.message) + '</p>' +
                    '<div class="back-link"><a href="index.html">&larr; Volver</a></div>';
            }
        })();
    </script>
</body>
</html>
